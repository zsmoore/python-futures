syntax = "proto3";

package worker;

service WorkerService {
  // Process a single item.
  rpc Process (ProcessRequest) returns (ProcessResponse);
  // Process a batch of items and return all results.
  rpc ProcessBatch (BatchRequest) returns (BatchResponse);
}

message ProcessRequest {
  int32 id = 1;
  string payload = 2;
}

message ProcessResponse {
  int32 id = 1;
  string result = 2;
  int32 status = 3;
  double duration_ms = 4;
}

message BatchRequest {
  repeated ProcessRequest requests = 1;
}

message BatchResponse {
  repeated ProcessResponse responses = 1;
  double total_duration_ms = 2;
}
